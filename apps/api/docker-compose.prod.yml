services:
    api:
        image: avatarkorranika/portfolio-api:latest
        build:
            context: .
            dockerfile: ./Dockerfile
        restart: unless-stopped
        env_file:
            - .env.prod
        # No ports exposed directly - accessed through nginx
        expose:
            - "3000"
        environment:
            - NODE_ENV=production
            - DATABASE_URL=/data/portfolio.db
            - FASTIFY_CLOSE_GRACE_DELAY=500
            - LOG_LEVEL=debug
            - PORT=3000
        volumes:
            - sqlite_data:/data
        networks:
            - app-network
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
                ]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 5s

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "443:443"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - ./ssl:/etc/nginx/ssl:ro
        networks:
            - app-network
        depends_on:
            - api

volumes:
    # Named volume for SQLite database persistence
    sqlite_data:
        driver: local

networks:
    app-network:
        driver: bridge
